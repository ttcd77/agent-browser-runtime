name: Bug report
description: Report documented behavior that failed.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do not include cookies, authorization headers, real HARs, private screenshots, account state, or target-confidential data.
  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: "0.1.0 or commit hash"
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What failed?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Use a local fixture or public-safe page where possible.
      placeholder: "1. Start worker...\n2. Call browser_open...\n3. ..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Public-safe logs or output
      render: shell

