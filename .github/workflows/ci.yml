name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Install Linux rolldown native binding
        if: runner.os == 'Linux'
        run: npm install --no-save @rolldown/binding-linux-x64-gnu@1.0.1

      - name: Install Windows rolldown native binding
        if: runner.os == 'Windows'
        run: npm install --no-save @rolldown/binding-win32-x64-msvc@1.0.1

      - name: Release readiness
        run: npm run release:readiness

      - name: Build, unit tests, and CLI smoke
        run: npm run check
